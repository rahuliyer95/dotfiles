# change the prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# start with window 1 (instead of 0)
set -g base-index 1

# start with pane 1
set -g pane-base-index 1

# split panes using | and -, make sure they open in the same path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

unbind '"'
unbind %

# open new windows in the current path
bind c new-window -c "#{pane_current_path}"

# reload config file
bind r source-file ~/.tmux.conf

unbind p
bind p previous-window

# shorten command delay
set -sg escape-time 0

# block programs from renaming windows via escape sequences
set-option -g allow-rename off

# mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# vim-style navigation
bind h select-pane -L
bind l select-pane -R
bind k select-pane -U
bind j select-pane -D

bind Tab next-window
bind S-Tab previous-window

# enable vi mode keys
set-window-option -g mode-keys vi

# true color + undercurl support
set -g default-terminal "tmux-256color"
if-shell -b '[ "$(tmux -V | cut -d" " -f2)" -ge 3.2 ]' \
  'set -ag terminal-features ",xterm-256color:RGB"'
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# sane scrolling
set -as terminal-overrides "xterm*:smcup@:rmcup@"

# fix pbcopy/pbpaste (macOS only)
if 'command -v reattach-to-user-namespace >/dev/null 2>&1' \
  'set -gq @osx-pasteboard true'

if 'command -v reattach-to-user-namespace >/dev/null 2>&1' \
  'set -g default-command "reattach-to-user-namespace -l $SHELL"'

# increase history buffer
set -g history-limit 65535

# update environment variables while re-attaching to session
set-option -g update-environment "SSH_AUTH_SOCK \
                                  SSH_CONNECTION \
                                  DISPLAY"

set-option -g set-titles on
set-option -g set-titles-string '#H:#S.#I.#P #W #T'

# Design

# quiet
set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-option -g bell-action none

# -- TokyoNight Storm palette --
# https://github.com/folke/tokyonight.nvim/blob/5da1b76e64daf4c5d410f06bcb6b9cb640da7dfd/extras/tmux/tokyonight_storm.tmux
# black=#1d202f  bg=#1f2335  fg_gutter=#3b4261
# fg=#c0caf5  fg_dark=#a9b1d6  blue=#7aa2f7
# cyan=#7dcfff  green=#9ece6a  yellow=#e0af68

# Modes
setw -g clock-mode-colour "#7aa2f7"
set -g mode-style "fg=#7aa2f7,bg=#3b4261"

# Panes
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
if-shell -b '[ "$(tmux -V | cut -d" " -f2)" -ge 3.2 ]' \
  'set -g pane-border-lines heavy'

# Messages
set -g message-style "fg=#7aa2f7,bg=#3b4261"
set -g message-command-style "fg=#7aa2f7,bg=#3b4261"

# Statusbar
set -g status "on"
set -g status-position bottom
set -g status-justify left
set -g status-style "fg=#7aa2f7,bg=#1f2335"
set -g status-left-length 100
set -g status-right-length 100
set -g status-left-style NONE
set -g status-right-style NONE

# left: session name in blue pill
set -g status-left "#[fg=#1d202f,bg=#7aa2f7,bold]  #S #[fg=#7aa2f7,bg=#1f2335,nobold,nounderscore,noitalics]"

# right: command, time, date
set -g status-right "\
#[fg=#3b4261,bg=#1f2335,nobold,nounderscore,noitalics]\
#[fg=#7aa2f7,bg=#3b4261] #{pane_current_command}   %H:%M \
#[fg=#7aa2f7,bg=#3b4261,nobold,nounderscore,noitalics]\
#[fg=#1d202f,bg=#7aa2f7,bold]  %d %b "

# window status (inactive)
setw -g window-status-activity-style "underscore,fg=#a9b1d6,bg=#1f2335"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#a9b1d6,bg=#1f2335"
setw -g window-status-format "\
#[fg=#1f2335,bg=#1f2335,nobold,nounderscore,noitalics]\
#[default] #I  #W #F \
#[fg=#1f2335,bg=#1f2335,nobold,nounderscore,noitalics]"

# window status (active)
setw -g window-status-current-format "\
#[fg=#1f2335,bg=#3b4261,nobold,nounderscore,noitalics]\
#[fg=#7aa2f7,bg=#3b4261,bold] #I  #W #F \
#[fg=#3b4261,bg=#1f2335,nobold,nounderscore,noitalics]"

set-option -g automatic-rename on
set-option -g automatic-rename-format "#{b:pane_current_path}"
